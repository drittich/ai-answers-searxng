name: CI Test Guard

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js (For JS Validation)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest flask

      - name: Python Syntax Check
        run: python -m py_compile ai_answers.py

      - name: Python Undefined Variable Check
        run: flake8 ai_answers.py --select=E9,F63,F7,F82 --show-source

      - name: Unit Tests
        run: python -m pytest tests/ -q

      - name: JavaScript Extraction & Syntax Check
        run: |
          python tests/extract_frontend_js.py
          node --check frontend_test.js